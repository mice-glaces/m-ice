<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>M'Ice – Choisissez votre glacier</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Choisissez votre glacier M'Ice : Embrun ou Chabottes." />

  <!-- Polices -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0c0c0c;
      color: #d6b46a;
      min-height: 100vh;
    }

    a { text-decoration: none; color: inherit; }

    .container { max-width: 1200px; margin: auto; padding: 40px 20px; }

    header { text-align: center; margin-bottom: 50px; }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      margin-bottom: 10px;
      color: #f1e2b8;
    }

    header p { color: rgba(214,180,106,0.7); font-size: 1rem; }

    .locations { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; }

    .location-card {
      position: relative;
      aspect-ratio: 16 / 10;
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid rgba(214,180,106,0.25);
      transition: transform 0.35s ease, box-shadow 0.35s ease;
      display: block;
    }

    .location-card:hover {
      transform: scale(1.03);
      box-shadow: 0 20px 50px rgba(214,180,106,0.15);
    }

    .location-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.25), rgba(0,0,0,0.65));
      z-index: 1;
      pointer-events: none;
    }

    .location-card img { width: 100%; height: 100%; object-fit: cover; }

    .location-content {
      position: absolute;
      z-index: 2;
      bottom: 30px;
      left: 30px;
    }

    .location-content h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 6px;
      color: #f1e2b8;
    }

    .location-content span {
      font-size: 0.9rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(214,180,106,0.75);
    }

    footer {
      text-align: center;
      margin-top: 50px;
      font-size: 0.8rem;
      color: rgba(214,180,106,0.45);
    }

    /* =========================
       EMBRUN - GRUES / CHANTIER
       ========================= */
    .location-renovation{
      cursor: default;
      border-style: dashed;
      border-color: rgba(214,180,106,0.6);
      background: radial-gradient(circle at 10% 0%, #2b2417 0%, #171319 55%, #0c0c0f 100%);
      box-shadow: 0 18px 40px rgba(0,0,0,0.45);
    }
    .location-renovation:hover{
      transform:none;
      box-shadow: 0 18px 40px rgba(0,0,0,0.45);
    }

    .renov-overlay{
      position:absolute;
      inset:0;
      z-index:2;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:26px;
    }

    .renov-panel{
      position:relative;
      width: min(520px, 92%);
      padding:16px 18px;
      border-radius:16px;
      background: rgba(0,0,0,0.72);
      border: 1px solid rgba(214,180,106,0.55);
      backdrop-filter: blur(10px);
      text-align:left;
      z-index:3;
    }

    .renov-badge{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(214,180,106,0.6);
      background: rgba(214,180,106,0.12);
      font-size:0.75rem;
      text-transform:uppercase;
      letter-spacing:0.12em;
      color:#f1e2b8;
      margin-bottom:10px;
      font-weight:600;
    }
    .renov-dot{
      width:9px;height:9px;border-radius:999px;
      background: rgba(214,180,106,0.9);
      box-shadow: 0 0 12px rgba(214,180,106,0.35);
      flex:0 0 9px;
    }

    .renov-panel h2{
      font-family:'Playfair Display',serif;
      font-size:2rem;
      color:#f1e2b8;
      margin-bottom:6px;
      line-height:1.05;
    }
    .renov-panel p{
      color: rgba(214,180,106,0.75);
      font-size:0.95rem;
    }

    /* 2 grues CSS */
    .crane{
      position:absolute;
      bottom:18px;
      left:18px;
      width:170px;
      height:120px;
      opacity:0.95;
      z-index:2;
      pointer-events:none;
      filter: drop-shadow(0 10px 22px rgba(0,0,0,.55));
    }
    .crane.right{
      left:auto;
      right:18px;
      transform: scaleX(-1);
      opacity:0.75;
    }

    .crane .mast{
      position:absolute;
      left:34px;
      bottom:6px;
      width:4px;
      height:84px;
      background: rgba(214,180,106,0.95);
    }
    .crane .arm{
      position:absolute;
      left:38px;
      bottom:84px;
      width:100px;
      height:2px;
      background: rgba(214,180,106,0.95);
      transform-origin: left center;
      animation: crane-swing 2.8s ease-in-out infinite alternate;
      box-shadow: 0 0 10px rgba(214,180,106,0.25);
    }
    .crane .cable{
      position:absolute;
      left:120px;
      bottom:52px;
      width:1px;
      height:34px;
      background: rgba(214,180,106,0.75);
      animation: cable-bob 2.8s ease-in-out infinite alternate;
    }
    .crane .hook{
      position:absolute;
      left:116px;
      bottom:46px;
      width:10px;
      height:10px;
      border:2px solid rgba(214,180,106,0.85);
      border-top-color: transparent;
      border-left-color: transparent;
      transform: rotate(45deg);
      animation: cable-bob 2.8s ease-in-out infinite alternate;
    }
    .crane .ground{
      position:absolute;
      left:0;
      right:0;
      bottom:6px;
      height:2px;
      background: rgba(214,180,106,0.55);
    }

    @keyframes crane-swing{
      0% { transform: rotate(-7deg); }
      100% { transform: rotate(7deg); }
    }
    @keyframes cable-bob{
      0% { transform: translateY(0); }
      100% { transform: translateY(6px); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .locations { grid-template-columns: 1fr; }
      header h1 { font-size: 1.9rem; }
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>Choisissez votre glacier M’Ice</h1>
      <p>Une expérience artisanale selon votre lieu</p>
    </header>

    <section class="locations">
      <!-- Embrun (non cliquable) -->
      <div class="location-card location-renovation" aria-label="Embrun – en rénovation">
        <div class="renov-overlay">
          <div class="crane">
            <div class="ground"></div>
            <div class="mast"></div>
            <div class="arm"></div>
            <div class="cable"></div>
            <div class="hook"></div>
          </div>

          <div class="crane right">
            <div class="ground"></div>
            <div class="mast"></div>
            <div class="arm"></div>
            <div class="cable"></div>
            <div class="hook"></div>
          </div>

          <div class="renov-panel">
            <div class="renov-badge"><span class="renov-dot" aria-hidden="true"></span>En rénovation</div>
            <h2>Embrun</h2>
            <p>Réouverture prochainement</p>
          </div>
        </div>
      </div>

      <!-- Chabottes -->
      <a href="index.chabottes.html" class="location-card">
        <img src="images/chabottes.jpg" alt="Glacier M'Ice Chabottes">
        <div class="location-content">
          <h2>Saint-Jean-Saint-Nicolas</h2>
          <span>Champsaur</span>
        </div>
      </a>
    </section>

    <footer>© M’Ice — Glacier artisanal</footer>
  </div>
</body>
</html>
