<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>M'Ice – Choisissez votre glacier</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Choisissez votre glacier M'Ice : Embrun ou Chabottes." />

  <!-- Polices -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0c0c0c;
      color: #d6b46a;
      min-height: 100vh;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      margin-bottom: 10px;
      color: #f1e2b8;
    }

    header p {
      color: rgba(214,180,106,0.7);
      font-size: 1rem;
    }

    .locations {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 30px;
    }

    .location-card {
      position: relative;
      aspect-ratio: 16 / 10;
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid rgba(214,180,106,0.25);
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .location-card:hover {
      transform: scale(1.03);
      box-shadow: 0 20px 50px rgba(214,180,106,0.15);
    }

    .location-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(0,0,0,0.25),
        rgba(0,0,0,0.65)
      );
      z-index: 1;
    }

    .location-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .location-content {
      position: absolute;
      z-index: 2;
      bottom: 30px;
      left: 30px;
    }

    .location-content h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 6px;
      color: #f1e2b8;
    }

    .location-content span {
      font-size: 0.9rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(214,180,106,0.75);
    }

    footer {
      text-align: center;
      margin-top: 50px;
      font-size: 0.8rem;
      color: rgba(214,180,106,0.45);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .locations {
        grid-template-columns: 1fr;
      }

      header h1 {
        font-size: 1.9rem;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <header>
      <h1>Choisissez votre glacier M’Ice</h1>
      <p>Une expérience artisanale selon votre lieu</p>
    </header>

    <section class="locations">
      <!-- Embrun -->
      <a href="embrun" class="location-card">
        <img src="images/embrun.jpg" alt="Glacier M'Ice Embrun">
        <div class="location-content">
          <h2>Embrun</h2>
          <span>Hautes-Alpes</span>
        </div>
      </a>

      <!-- Saint-Jean-Saint-Nicolas -->
      <a href="index.chabottes.html" class="location-card">
        <img src="images/chabottes.jpg" alt="Glacier M'Ice Chabottes">
        <div class="location-content">
          <h2>Saint-Jean-Saint-Nicolas </h2>
          <span>Champsaur</span>
        </div>
      </a>
    </section>

    <footer>
      © M’Ice — Glacier artisanal
    </footer>
  </div>

</body>
</html>
